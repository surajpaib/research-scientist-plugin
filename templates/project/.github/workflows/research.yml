# Research CI/CD Workflow
#
# Validates research project integrity on push and pull request.
# Customize paths and commands for your specific project.
#
# NOTE: This workflow runs on GitHub-hosted runners. If your project
# contains PHI or requires access to protected data, use a self-hosted
# runner or disable data-dependent steps.

name: Research CI

on:
  push:
    branches: [main]
    paths:
      - 'approaches/**'
      - 'paper/**'
      - 'vault/**'
      - '*.py'
      - 'requirements.txt'
  pull_request:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger

env:
  PYTHON_VERSION: '3.11'

jobs:
  # ==========================================================================
  # Job 1: Validate Configuration Files
  # ==========================================================================
  validate-configs:
    name: Validate Configs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install pyyaml

      - name: Validate YAML configs
        run: |
          python -c "
          import yaml
          import sys
          from pathlib import Path

          errors = []
          for config_file in Path('.').rglob('*.yaml'):
              try:
                  with open(config_file) as f:
                      data = yaml.safe_load(f)
                  print(f'✓ {config_file}')
              except Exception as e:
                  errors.append(f'{config_file}: {e}')
                  print(f'✗ {config_file}: {e}')

          if errors:
              sys.exit(1)
          "

      - name: Check reproducibility requirements
        run: |
          python -c "
          import yaml
          import sys
          from pathlib import Path

          warnings = []
          for config_file in Path('approaches').rglob('*.yaml'):
              with open(config_file) as f:
                  data = yaml.safe_load(f)

              if data is None:
                  continue

              # Check for seed
              if 'seed' not in str(data).lower():
                  warnings.append(f'{config_file}: No seed found')

              # Check for hardcoded paths
              content = config_file.read_text()
              if '/Users/' in content or '/home/' in content:
                  warnings.append(f'{config_file}: Contains hardcoded path')

          for w in warnings:
              print(f'⚠ {w}')

          # Warnings don't fail the build, just report
          "

  # ==========================================================================
  # Job 2: Validate Paper Build
  # ==========================================================================
  build-paper:
    name: Build Paper
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: |
          pip install python-docx pyyaml

      - name: Check citation keys
        working-directory: paper
        run: |
          # Extract citation keys from paper.md
          grep -oP '@\w+' paper.md | sort -u > used_keys.txt || true

          # Extract keys from references.bib
          grep -oP '^@\w+\{(\w+),' references.bib | sed 's/.*{\(.*\),/\1/' | sort -u > defined_keys.txt || true

          # Find missing keys
          comm -23 used_keys.txt defined_keys.txt > missing_keys.txt || true

          if [ -s missing_keys.txt ]; then
            echo "⚠ Citation keys used but not defined:"
            cat missing_keys.txt
            # Don't fail - just warn
          else
            echo "✓ All citation keys are defined"
          fi

      - name: Build paper (dry run)
        working-directory: paper
        run: |
          # Check if Makefile exists
          if [ -f Makefile ]; then
            # Try to build without the actual docx (may fail if template missing)
            pandoc paper.md \
              --from markdown \
              --to docx \
              --citeproc \
              --bibliography=references.bib \
              --output=/dev/null 2>&1 || echo "⚠ Paper build check completed with warnings"
          else
            echo "No Makefile found - skipping build"
          fi

  # ==========================================================================
  # Job 3: Lint Python Code
  # ==========================================================================
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linters
        run: |
          pip install ruff

      - name: Run ruff
        run: |
          ruff check . --select=E,F,I --ignore=E501 || true

  # ==========================================================================
  # Job 4: Validate Vault Structure
  # ==========================================================================
  validate-vault:
    name: Validate Vault
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check required vault files
        run: |
          required_files=(
            "vault/Home.md"
            "vault/Reference/Statistical Decisions.md"
            "vault/Logs/Session Log.md"
          )

          missing=0
          for file in "${required_files[@]}"; do
            if [ -f "$file" ]; then
              echo "✓ $file"
            else
              echo "✗ $file (missing)"
              missing=1
            fi
          done

          if [ $missing -eq 1 ]; then
            echo "⚠ Some vault files are missing"
            # Don't fail - just warn
          fi

      - name: Check for broken wikilinks
        run: |
          python -c "
          import re
          from pathlib import Path

          vault_files = {f.stem.lower(): f for f in Path('vault').rglob('*.md')}
          broken_links = []

          for md_file in Path('vault').rglob('*.md'):
              content = md_file.read_text()
              # Find wikilinks
              links = re.findall(r'\[\[([^\]|]+)', content)
              for link in links:
                  link_lower = link.lower()
                  if link_lower not in vault_files:
                      broken_links.append(f'{md_file}: [[{link}]]')

          if broken_links:
              print('⚠ Potential broken wikilinks:')
              for bl in broken_links[:10]:  # Show first 10
                  print(f'  {bl}')
          else:
              print('✓ No broken wikilinks detected')
          "

  # ==========================================================================
  # Job 5: Run Analysis Validation (Optional - Uncomment if needed)
  # ==========================================================================
  # validate-analysis:
  #   name: Validate Analysis
  #   runs-on: ubuntu-latest
  #   # Only run on self-hosted runner if you need access to data
  #   # runs-on: self-hosted
  #
  #   steps:
  #     - name: Checkout code
  #       uses: actions/checkout@v4
  #
  #     - name: Set up Python
  #       uses: actions/setup-python@v5
  #       with:
  #         python-version: ${{ env.PYTHON_VERSION }}
  #
  #     - name: Install dependencies
  #       run: |
  #         pip install -r requirements.txt
  #
  #     - name: Run analysis in validation mode
  #       run: |
  #         python -m approaches.body_composition.scripts.clinical_analysis --validate
  #
  #     - name: Verify statistics match paper
  #       run: |
  #         python -m approaches.body_composition.scripts.publication_stats --verify paper/paper.md

  # ==========================================================================
  # Summary Job
  # ==========================================================================
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [validate-configs, build-paper, lint-python, validate-vault]
    if: always()

    steps:
      - name: Check results
        run: |
          echo "## CI Results Summary"
          echo ""
          echo "| Job | Status |"
          echo "|-----|--------|"
          echo "| Validate Configs | ${{ needs.validate-configs.result }} |"
          echo "| Build Paper | ${{ needs.build-paper.result }} |"
          echo "| Lint Python | ${{ needs.lint-python.result }} |"
          echo "| Validate Vault | ${{ needs.validate-vault.result }} |"
