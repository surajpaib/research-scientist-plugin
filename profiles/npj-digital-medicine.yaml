# npj Digital Medicine Profile
# https://www.nature.com/npjdigitalmed/

journal:
  name: "npj Digital Medicine"
  abbreviation: "NPJ Digit Med"
  publisher: "Nature Portfolio / Springer Nature"
  impact_factor: 15.2
  scope: "digital health, AI/ML in medicine"

manuscript:
  word_limit:
    article: 5000
    brief_communication: 2500
    review: 6000
    perspective: 3000

  abstract:
    type: unstructured
    word_limit: 200
    sections: null  # single paragraph

  sections:
    required:
      - Introduction
      - Methods
      - Results
      - Discussion
    recommended:
      - Code Availability
      - Data Availability
      - Model Cards (for ML models)

  figures:
    max_count: 10
    extended_data: "additional figures as Extended Data"
    formats: [pdf, eps, tiff, png]
    min_dpi: 300
    color: "free (open access)"

  tables:
    max_count: 6
    extended_data: "additional tables as Extended Data"

  references:
    max_count: 80
    style: "Nature"
    doi_required: true

formatting:
  reference_style: nature
  csl_file: "nature.csl"

  statistics:
    p_value_format: "P = 0.001"
    ci_format: "95% CI lower–upper"  # en-dash
    effect_size_format: "HR 2.3 (95% CI 1.5–3.4, P = 0.001)"

  ml_requirements:
    - "Report train/validation/test split"
    - "Report hyperparameter selection process"
    - "Include calibration metrics"
    - "Report performance by subgroup"
    - "Provide model interpretability analysis"
    - "Follow TRIPOD+AI for prediction models"

submission:
  system: "Nature Portfolio submission system"
  cover_letter: required
  preprint_policy: "encouraged (medRxiv, arXiv)"

  required_statements:
    - "Ethics approval"
    - "Informed consent"
    - "Funding"
    - "Author contributions"
    - "Competing interests"
    - "Code availability"
    - "Data availability"

  reporting_standards:
    prediction_model: "TRIPOD+AI"
    diagnostic_ai: "STARD-AI"
    clinical_trial: "CONSORT-AI"

review:
  type: "single-blind"
  typical_time: "6-8 weeks"
  open_access: true
  apc: "~$5,990 USD"
